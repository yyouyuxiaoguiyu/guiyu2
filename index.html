<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵动商城 | 动效购物体验</title>
    <!-- 引入动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.3/dist/lottie-player.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2ff;
        }
        ::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 10px;
        }

        .navbar {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            border-bottom: 1px solid #eef2ff;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(120deg, #f97316, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-icons {
            display: flex;
            gap: 1.8rem;
        }
        .nav-icons span {
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-icons span:hover {
            transform: scale(1.08);
            color: #f97316;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        .hero-promo {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #fff5ed 0%, #fee2e2 100%);
            border-radius: 0.5rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 12px 20px -10px rgba(249,115,22,0.2);
        }
        .promo-text {
            flex: 2;
        }
        .promo-text h2 {
            font-size: 1.9rem;
            font-weight: 800;
        }
        .promo-text .highlight {
            color: #f97316;
            background: #fff0e6;
            display: inline-block;
            padding: 0 8px;
            border-radius: 40px;
        }
        .promo-lottie {
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .countdown-badge {
            background: #1e293b;
            color: white;
            padding: 0.25rem 1rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .cat-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.3rem;
            border-radius: 60px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .cat-btn:hover,
        .cat-btn.active {
            background: transparent;
            color: #f97316;
            transform: scale(1.05);
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .cat-btn:active {
            transform: scale(0.98);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin: 1.8rem 0;
        }
        .product-card {
            background: white;
            border-radius: 0.3rem;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: default;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }
        .product-img {
            background: #fef3f0;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .product-img img {
            width: auto;
            height: auto;
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .product-card:hover .product-img img {
            transform: scale(1.02);
        }
        .badge-hot {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #f43f5e;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }
        .product-info {
            padding: 1rem 1rem 1.2rem;
        }
        .product-title {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .price {
            color: #f97316;
            font-weight: 800;
            font-size: 1.3rem;
            margin: 0.5rem 0;
        }
        .add-cart {
            background: #1e293b;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-cart:hover {
            background: #f97316;
            transform: scale(1.01);
        }

        .feature-banner {
            background: linear-gradient(120deg, #1e293b, #2d3a4b);
            border-radius: 0.5rem;
            padding: 2rem;
            margin: 2.5rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            color: white;
            gap: 20px;
        }
        .feature-banner h3 {
            font-size: 1.8rem;
        }
        .gsap-playground {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .magic-box {
            width: 70px;
            height: 70px;
            background: #f97316;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
        }
        button.glow-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
        }

        .cart-sidebar {
            position: fixed;
            right: -380px;
            top: 0;
            width: 360px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #eef2ff;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
        }
        .cart-total {
            border-top: 1px solid #ddd;
            padding-top: 1rem;
            font-weight: 800;
        }
        .close-cart {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
        }
        .overlay.show {
            display: block;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            margin-top: 3rem;
        }
        @media (max-width: 680px) {
            .container {
                padding: 1rem;
            }
            .hero-promo {
                flex-direction: column;
                text-align: center;
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo animate__animated animate__fadeInLeft">✨ 灵动商城</div>
        <div class="nav-icons">
            <span>❤️</span>
            <span id="cartIcon">🛒<span id="cartCountBadge" style="font-size:0.7rem; background:#f97316; border-radius:30px; padding:0 6px; margin-left:4px;">0</span></span>
            <span>👤</span>
        </div>
    </div>
</div>

<div class="container">
    <!-- 促销区域 -->
    <div class="hero-promo animate__animated animate__fadeInUp">
        <div class="promo-text">
            <h2>限时闪购 · <span class="highlight">5折起</span></h2>
            <div class="countdown-badge">🔥 今日热卖 最后4小时</div>
        </div>
        <div class="promo-lottie">
            <div style="font-size: 4rem; animation: bounce 1s ease infinite;">🎁</div>
        </div>
    </div>

    <!-- 分类过滤器 -->
    <div class="categories">
        <button class="cat-btn active" data-cat="all">全部</button>
        <button class="cat-btn" data-cat="electronics">数码</button>
        <button class="cat-btn" data-cat="fashion">潮服</button>
        <button class="cat-btn" data-cat="living">家居</button>
    </div>

    <!-- 商品网格 -->
    <div class="products-grid" id="productGrid"></div>

    <!-- GSAP + Anime 互动区域 -->
    <div class="feature-banner">
        <div>
            <h3>🛍️ 超值惊喜盒子</h3>
        </div>
        <div class="gsap-playground">
            <div class="magic-box" id="magicGiftBox">🎁</div>
            <button class="glow-btn" id="animeRewardBtn">💎 点击抽奖 </button>
        </div>
    </div>

    <!-- 滚动推荐区域 -->
    <div style="margin: 2rem 0;">
        <h2 style="margin-bottom: 1rem;">✨ 为你推荐 ✨</h2>
        <div class="products-grid" id="scrollProducts"></div>
    </div>
</div>

<!-- 购物车侧滑 -->
<div class="overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <span>我的购物车 🛒</span>
        <button class="close-cart" id="closeCartBtn">✕</button>
    </div>
    <div class="cart-items" id="cartItemsList">
        <div style="text-align:center; color:gray;">暂无商品</div>
    </div>
    <div class="cart-total">总计: ¥<span id="cartTotalPrice">0</span></div>
    <button style="background:#f97316; margin-top:1rem;" class="add-cart">去结算</button>
</div>

<footer>© 灵动商城 | 动效驱动购物体验</footer>

<script>
    // ---------- 商品数据 ----------
    const products = [
        { id: 1, name: "极光降噪耳机", price: 399, category: "electronics", hot: true, imgUrl: "images/017.png" },
        { id: 2, name: "机能风卫衣", price: 189, category: "fashion", hot: false, imgUrl: "images/018.png" },
        { id: 3, name: "智能温控杯", price: 129, category: "living", hot: true, imgUrl: "images/019.png" },
        { id: 4, name: "超轻运动手表", price: 599, category: "electronics", hot: false, imgUrl: "images/020.png" },
        { id: 5, name: "宽松工装裤", price: 229, category: "fashion", hot: false, imgUrl: "images/021.png" },
        { id: 6, name: "香薰加湿器", price: 99, category: "living", hot: true, imgUrl: "images/022.png" },
        { id: 7, name: "磁吸充电宝", price: 149, category: "electronics", hot: false, imgUrl: "images/023.png" },
        { id: 8, name: "复古跑鞋", price: 459, category: "fashion", hot: true, imgUrl: "images/024.png" }
    ];
    
    let cart = [];

    // 更新所有商品卡片按钮上的数量显示
    function updateAllCartButtons() {
        document.querySelectorAll('#productGrid .add-cart').forEach(btn => {
            const productId = parseInt(btn.getAttribute('data-id'));
            const cartItem = cart.find(item => item.id === productId);
            const qty = cartItem ? cartItem.quantity : 0;
            if (qty > 0) {
                btn.innerHTML = `➕ 加入购物车 (${qty})`;
            } else {
                btn.innerHTML = `➕ 加入购物车`;
            }
        });
        document.querySelectorAll('#scrollProducts .add-cart').forEach(btn => {
            const productId = parseInt(btn.getAttribute('data-id'));
            if (productId && !isNaN(productId)) {
                const cartItem = cart.find(item => item.id === productId);
                const qty = cartItem ? cartItem.quantity : 0;
                if (qty > 0) {
                    btn.innerHTML = `➕ 加入购物车 (${qty})`;
                } else {
                    btn.innerHTML = `➕ 加入购物车`;
                }
            }
        });
    }

    function updateCartUI() {
        const cartContainer = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotalPrice');
        const badge = document.getElementById('cartCountBadge');
        if (!cartContainer) return;
        if (cart.length === 0) {
            cartContainer.innerHTML = '<div style="text-align:center; color:gray;">暂无商品</div>';
            totalSpan.innerText = '0';
            badge.innerText = '0';
            updateAllCartButtons();
            return;
        }
        let total = 0;
        let itemsCount = 0;
        let html = '';
        cart.forEach((item) => {
            total += item.price * item.quantity;
            itemsCount += item.quantity;
            html += `
                <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #f0f0f0; padding:8px 0;">
                    <div><strong>${item.name}</strong><br/>¥${item.price} x ${item.quantity}</div>
                    <div><button data-id="${item.id}" class="remove-item" style="background:none; border:none; color:#f97316; cursor:pointer;">🗑️</button></div>
                </div>
            `;
        });
        cartContainer.innerHTML = html;
        totalSpan.innerText = total;
        badge.innerText = itemsCount;
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const existingIndex = cart.findIndex(i => i.id === id);
                if (existingIndex !== -1) {
                    if (cart[existingIndex].quantity > 1) cart[existingIndex].quantity--;
                    else cart.splice(existingIndex, 1);
                    updateCartUI();
                    gsap.fromTo('#cartIcon', { scale: 1.2 }, { scale: 1, duration: 0.2 });
                }
            });
        });
        updateAllCartButtons();
    }
    
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
        const cartIconSpan = document.getElementById('cartIcon');
        cartIconSpan.classList.add('animate__animated', 'animate__heartBeat');
        setTimeout(() => cartIconSpan.classList.remove('animate__animated', 'animate__heartBeat'), 800);
        gsap.to(cartIconSpan, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
    }
    
    let activeCategory = "all";
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        const filtered = activeCategory === "all" ? products : products.filter(p => p.category === activeCategory);
        grid.innerHTML = filtered.map(product => `
            <div class="product-card" data-id="${product.id}">
                <div class="product-img">
                    ${product.hot ? '<div class="badge-hot">热卖</div>' : ''}
                    <img src="${product.imgUrl}" alt="${product.name}" loading="lazy">
                </div>
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="price">¥${product.price}</div>
                    <button class="add-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}">➕ 加入购物车</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.add-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const product = products.find(p => p.id === id);
                if (product) addToCart(product);
            });
        });
        updateAllCartButtons();
        gsap.fromTo('.product-card', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.05 });
    }
    
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.getAttribute('data-cat');
            renderProducts();
        });
    });
    
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');
    document.getElementById('cartIcon').addEventListener('click', () => {
        cartSidebar.classList.add('open');
        cartOverlay.classList.add('show');
    });
    function closeCart() {
        cartSidebar.classList.remove('open');
        cartOverlay.classList.remove('show');
    }
    document.getElementById('closeCartBtn').addEventListener('click', closeCart);
    cartOverlay.addEventListener('click', closeCart);
    
    // GSAP 互动 (点击礼物盒)
    const magicBox = document.getElementById('magicGiftBox');
    magicBox.addEventListener('click', () => {
        gsap.to(magicBox, { duration: 0.2, scale: 1.3, yoyo: true, repeat: 1, ease: "back.out" });
        gsap.to(magicBox, { rotation: 15, duration: 0.1, yoyo: true, repeat: 3, onComplete: () => {
            alert("🎉 恭喜获得9折优惠券！ ");
            gsap.to(magicBox, { rotation: 0 });
        }});
    });
    
    // Anime 脉冲抽奖 - 修复旋转后不归零问题
    document.getElementById('animeRewardBtn').addEventListener('click', () => {
        anime({
            targets: '#magicGiftBox',
            scale: [
                { value: 1.2, duration: 200, easing: 'easeOutQuad' },
                { value: 1, duration: 200 }
            ],
            rotate: '0.5turn',
            backgroundColor: ['#f97316', '#f43f5e', '#f97316'],
            duration: 800,
            direction: 'normal',
            loop: false,
            complete: () => {
                // 动画结束后强制重置旋转角度为 0，背景色恢复原色（确保样式正确）
                gsap.set(magicBox, { rotation: 0, backgroundColor: "#f97316" });
                alert("✨ Anime.js 特效完成! 获得满199减20券✨");
            }
        });
    });
    
    // 滚动推荐商品
    const extraProducts = [
        { name: "无线鼠标轻音版", price: 79, imgUrl: "images/025.png" },
        { name: "led氛围台灯", price: 159, imgUrl: "images/026.png" },
        { name: "帆布托特包", price: 99, imgUrl: "images/027.png" },
        { name: "便携烧水杯", price: 199, imgUrl: "images/028.png" }
    ];
    const scrollContainer = document.getElementById('scrollProducts');
    if (scrollContainer) {
        scrollContainer.innerHTML = extraProducts.map((prod, idx) => {
            const uniqueId = 1000 + idx;
            return `
            <div class="product-card scroll-card" style="background:white;">
                <div class="product-img">
                    <img src="${prod.imgUrl}" alt="${prod.name}" loading="lazy">
                </div>
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="price">¥${prod.price}</div>
                    <button class="add-cart" data-id="${uniqueId}" data-name="${prod.name}" data-price="${prod.price}">➕ 加入购物车</button>
                </div>
            </div>
        `}).join('');
        document.querySelectorAll('#scrollProducts .add-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseInt(btn.getAttribute('data-price'));
                const fakeProduct = { id: id, name, price, icon: "🎁", imgUrl: "" };
                addToCart(fakeProduct);
            });
        });
        updateAllCartButtons();
    }
    
    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('.scroll-card').forEach((card) => {
        gsap.from(card, {
            scrollTrigger: {
                trigger: card,
                start: "top 90%",
                toggleActions: "play none none reverse",
                once: false
            },
            opacity: 0,
            x: -50,
            rotationY: 20,
            duration: 0.8,
            ease: "power2.out"
        });
    });
    gsap.utils.toArray('.product-card').forEach(card => {
        gsap.from(card, {
            scrollTrigger: {
                trigger: card,
                start: "top 95%",
                once: true,
            },
            opacity: 0,
            y: 40,
            duration: 0.5
        });
    });
    
    const heroDiv = document.querySelector('.hero-promo');
    gsap.to(heroDiv, { y: -4, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
    
    renderProducts();
    updateCartUI();
</script>
</body>
</html>
